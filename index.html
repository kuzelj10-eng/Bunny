<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNNY Smash Burger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ein kleiner Effekt für den Neon-Vibe */
        .neon-border {
            box-shadow: 0 0 10px rgba(227, 29, 43, 0.5), 0 0 20px rgba(227, 29, 43, 0.3);
        }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans pb-24">

    <header class="p-6 text-center border-b border-red-700 bg-gray-900 shadow-xl">
        <div class="flex justify-center items-center gap-4">
            <img src="bunny-logo.png" alt="BUNNY Logo" class="w-16 h-16 rounded-full border-2 border-red-600 shadow-lg">
            <h1 class="text-6xl font-extrabold text-red-600 tracking-tighter">BUNNY</h1>
        </div>
        <p class="text-yellow-400 font-bold uppercase tracking-widest mt-2 text-sm">Smash Burger & Fries</p>
    </header>

    <section class="p-4 mt-4">
        <div class="relative w-full h-56 rounded-2xl overflow-hidden neon-border">
            <img src="burger-hero.jpg" alt="Frische Smash Burger" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
            <div class="absolute bottom-4 left-4">
                <h2 class="text-3xl font-extrabold text-white">Heiß. Fettig. <br/>Kross.</h2>
                <p class="text-yellow-400 font-semibold mt-1">Direkt bestellen.</p>
            </div>
        </div>
    </section>

    <main class="p-4">
        <h2 class="text-xl font-bold text-gray-500 uppercase mb-4 mt-6">Top Menüs</h2>
        
        <div class="space-y-5">
            <div class="bg-gray-900 p-5 rounded-xl border border-gray-800 flex justify-between items-center hover:border-red-600 transition-colors cursor-pointer">
                <div>
                    <h3 class="font-bold text-xl">Single Bunny Menü</h3>
                    <p class="text-sm text-gray-400">Burger, Pommes, Getränk</p>
                </div>
                <span class="text-2xl font-bold text-yellow-400">9,90€</span>
            </div>

            <div class="bg-gray-900 p-5 rounded-xl border border-gray-800 flex justify-between items-center hover:border-red-600 transition-colors cursor-pointer">
                <div>
                    <h3 class="font-bold text-xl">Double Bunny Menü</h3>
                    <p class="text-sm text-gray-400">2x Burger, Pommes, Getränk</p>
                </div>
                <span class="text-2xl font-bold text-yellow-400">11,90€</span>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full p-4 bg-gray-950 border-t border-gray-800 shadow-[0_-10px_20px_rgba(0,0,0,0.3)] z-50">
        <button class="w-full bg-yellow-400 text-black py-4 rounded-xl font-black text-2xl uppercase shadow-lg shadow-yellow-400/20 active:scale-95 transition-transform">
          Warenkorb (0) - Jetzt Bestellen
        </button>
    </footer>

</body>
</html>
