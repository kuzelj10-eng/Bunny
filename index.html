<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNNY - Smash Burger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-text { text-shadow: 0 0 10px #dc2626; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen pb-20">

    <header class="sticky top-0 bg-gray-900 border-b border-red-700 p-4 flex items-center justify-between z-50">
        <div class="flex items-center gap-3">
            <img src="bunny-logo.png" alt="Bunny Logo" class="w-12 h-12 rounded-full border border-red-600 bg-black object-cover">
            <div>
                <h1 class="text-2xl font-bold text-red-600 neon-text leading-none">BUNNY</h1>
                <p class="text-[10px] text-yellow-500 uppercase tracking-widest font-bold">Smash Burger & Fries</p>
            </div>
        </div>
        <div class="bg-red-700 p-2 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
        </div>
    </header>

    <div class="w-full h-48 overflow-hidden">
        <img src="burger-hero.jpg" alt="Smash Burger" class="w-full h-full object-cover">
    </div>

    <main class="p-4 space-y-6">
        
        <section>
            <h2 class="text-xl font-bold text-yellow-400 mb-3 border-l-4 border-yellow-400 pl-2">MENÜPREISE</h2>
            <div class="space-y-3">
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 flex justify-between items-center">
                    <div><h3 class="font-bold">Single Bunny Menü</h3><p class="text-xs text-gray-400">Burger + Pommes + Getränk</p></div>
                    <div class="flex items-center gap-3"><span class="font-bold text-yellow-500">9,90€</span><button class="bg-red-600 px-3 py-1 rounded font-bold">+</button></div>
                </div>
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 flex justify-between items-center">
                    <div><h3 class="font-bold">Double Bunny Menü</h3><p class="text-xs text-gray-400">2x Burger + Pommes + Getränk</p></div>
                    <div class="flex items-center gap-3"><span class="font-bold text-yellow-500">11,90€</span><button class="bg-red-600 px-3 py-1 rounded font-bold">+</button></div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold text-yellow-400 mb-3 border-l-4 border-yellow-400 pl-2">EINZELPREISE</h2>
            <div class="space-y-3">
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 flex justify-between items-center">
                    <div><h3 class="font-bold">Burger (nach Wahl)</h3></div>
                    <div class="flex items-center gap-3"><span class="font-bold text-yellow-500">6,90€</span><button class="bg-red-600 px-3 py-1 rounded font-bold">+</button></div>
                </div>
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 flex justify-between items-center">
                    <div><h3 class="font-bold">Bunny's Chicken Tender (3 Stk)</h3></div>
                    <div class="flex items-center gap-3"><span class="font-bold text-yellow-500">4,90€</span><button class="bg-red-600 px-3 py-1 rounded font-bold">+</button></div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold text-yellow-400 mb-3 border-l-4 border-yellow-400 pl-2">LOADED FRIES</h2>
            <div class="grid grid-cols-1 gap-2">
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 flex justify-between items-center">
                    <h3 class="font-bold">Trüffel Fries</h3>
                    <div class="flex items-center gap-3"><span class="font-bold text-yellow-500">7,90€</span><button class="bg-red-600 px-3 py-1 rounded font-bold">+</button></div>
                </div>
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-800 flex justify-between items-center">
                    <h3 class="font-bold">Chili Cheese Fries</h3>
                    <div class="flex items-center gap-3"><span class="font-bold text-yellow-500">5,90€</span><button class="bg-red-600 px-3 py-1 rounded font-bold">+</button></div>
                </div>
            </div>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-gray-900 border-t border-red-700">
        <button class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl shadow-lg">
            JETZT BESTELLEN
        </button>
    </div>

</body>
</html>
