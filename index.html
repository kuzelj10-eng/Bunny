<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNNY Smash Burger | EK Design Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Neon-Effekt für den Header */
        .neon-text {
            text-shadow: 0 0 10px rgba(227, 29, 43, 0.7), 0 0 20px rgba(227, 29, 43, 0.5);
        }
        /* Subtiler Schatten für Bilder */
        .img-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans pb-28">

    <header class="p-5 text-center border-b border-red-700 bg-gray-900 shadow-2xl sticky top-0 z-50">
        <div class="flex justify-center items-center gap-4">
            <img src="bunny-logo.png" alt="BUNNY Logo" class="w-16 h-16 rounded-full border-2 border-red-600 shadow-lg object-cover">
            <h1 class="text-6xl font-extrabold text-red-600 tracking-tighter neon-text">BUNNY</h1>
        </div>
        <p class="text-yellow-400 font-bold uppercase tracking-widest mt-2 text-xs">Smash Burger & Fries</p>
    </header>

    <section class="p-4 mt-4">
        <div class="relative w-full h-60 rounded-2xl overflow-hidden img-shadow border border-gray-800">
            <img src="burger-hero.jpg" alt="BUNNY Smash Burger" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent"></div>
            <div class="absolute bottom-4 left-4">
                <h2 class="text-4xl font-extrabold text-white tracking-tight">Smash.<br/>Eat.<br/>Repeat.</h2>
                <p class="text-yellow-400 font-semibold mt-1">Jetzt bestellen.</p>
            </div>
        </div>
    </section>

    <main class="p-4">
        <h2 class="text-xl font-bold text-gray-500 uppercase mb-4 mt-6">Top Menüs</h2>
        
        <div class="space-y-5">
            <div class="bg-gray-900 p-5 rounded-xl border border-gray-800 flex justify-between items-center hover:border-red-600 transition-colors cursor-pointer shadow-md">
                <div>
                    <h3 class="font-bold text-xl">Single Bunny Menü</h3>
                    <p class="text-sm text-gray-400">Burger, Pommes, Getränk</p>
                </div>
                <span class="text-2xl font-bold text-yellow-400">9,90€</span>
            </div>

            <div class="bg-gray-900 p-5 rounded-xl border border-gray-800 flex justify-between items-center hover:border-red-600 transition-colors cursor-pointer shadow-md">
                <div>
                    <h3 class="font-bold text-xl">Double Bunny Menü</h3>
                    <p class="text-sm text-gray-400">2x Burger, Pommes, Getränk</p>
                </div>
                <span class="text-2xl font-bold text-yellow-400">11,90€</span>
            </div>
        </div>
    </main>

    <section class="p-4 mt-6">
        <div class="relative w-full h-48 rounded-2xl overflow-hidden img-shadow border border-gray-800">
            <img src="loaded-fries.jpg" alt="BUNNY Loaded Fries" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/50"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <h3 class="text-3xl font-extrabold text-white uppercase tracking-tighter shadow-lg">Loaded Fries</h3>
            </div>
        </div>
    </section>

    <section class="p-4 mt-6 mb-10">
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-inner text-center">
            <h4 class="text-lg font-bold text-gray-400 uppercase mb-3">Original Karte</h4>
            <img src="speisekarte-bg.jpg" alt="BUNNY Speisekarte Original" class="w-full h-auto rounded-lg img-shadow border border-gray-700 mx-auto max-w-sm">
            <p class="text-gray-500 text-xs mt-3">Preise & Angebot laut Aushang.</p>
        </div>
    </section>

    <footer class="fixed bottom-0 left-0 w-full p-4 bg-gray-950 border-t border-gray-800 shadow-[0_-10px_20px_rgba(0,0,0,0.5)] z-50">
        <button class="w-full bg-yellow-400 text-black py-4 rounded-xl font-black text-2xl uppercase shadow-lg shadow-yellow-400/30 active:scale-95 transition-transform">
          Warenkorb (0) - Jetzt Bestellen
        </button>
    </footer>

</body>
</html>
